<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WARPONG · dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0b0b;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR KIRI */
        .sidebar {
            width: 280px;
            background: #121315;
            border-right: 1px solid #2a2d33;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #26292f;
        }

        .sidebar-header h2 {
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #fff, #a0aaba);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header span {
            color: #1DB954;
            font-size: 0.7rem;
            margin-left: 4px;
        }

        .online-counter {
            background: #1a1c22;
            margin: 0.8rem 1rem;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2f323a;
            flex-shrink: 0;
        }

        .online-counter .label {
            color: #8f99a8;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            background: #1DB954;
            display: inline-block;
        }

        .online-counter .count {
            background: #262a33;
            color: #fff;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .broadcast-btn {
            margin: 0 1rem 1rem;
            background: #1a1c22;
            border: 1px solid #2f323a;
            color: #e2e8f0;
            padding: 0.7rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
            font-size: 0.9rem;
        }

        .broadcast-btn:hover {
            background: #20232a;
            border-color: #1DB954;
            color: #fff;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem;
        }

        .user-item {
            background: #1a1c22;
            border: 1px solid #2f323a;
            border-radius: 14px;
            padding: 0.7rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-item:hover {
            border-color: #1DB954;
            background: #20232a;
        }

        .user-item.selected {
            background: #20232a;
            border-color: #1DB954;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 38px;
            background: #262a33;
            border: 2px solid #3f4550;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status {
            font-size: 0.65rem;
            color: #8f99a8;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 6px;
            background: #1DB954;
        }

        .status-dot.offline {
            background: #4b5363;
        }

        /* AREA TENGAH */
        .center-area {
            flex: 1;
            background: #0b0b0b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        .placeholder-message {
            text-align: center;
            color: #4b5363;
            background: #1a1c22;
            padding: 1.5rem 2rem;
            border-radius: 18px;
            border: 1px solid #2f323a;
        }

        .placeholder-message i {
            font-size: 2.2rem;
            color: #1DB954;
            margin-bottom: 0.8rem;
            display: block;
            opacity: 0.7;
        }

        .placeholder-message p {
            color: #8f99a8;
            font-size: 0.85rem;
        }

        .placeholder-message small {
            font-size: 0.65rem;
            color: #4b5363;
            display: block;
            margin-top: 0.5rem;
        }

        /* CHAT PANEL - FIX TOMBOL KETIK */
        .chat-panel {
            width: 280px;
            background: #121315;
            border-left: 1px solid #2a2d33;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .chat-header {
            padding: 1rem 1rem;
            border-bottom: 1px solid #26292f;
            font-weight: 500;
            color: #ccd6e3;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .chat-header i {
            color: #1DB954;
        }

        .chat-header span {
            color: #1DB954;
            margin-left: auto;
            font-size: 0.8rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .message {
            max-width: 80%;
            padding: 0.6rem 0.9rem;
            border-radius: 16px;
            background: #1a1c22;
            border: 1px solid #2f323a;
            font-size: 0.8rem;
            align-self: flex-start;
            color: #e2e8f0;
            word-break: break-word;
        }

        .message.own {
            background: #1DB954;
            border-color: #1DB954;
            color: #0b0b0b;
            align-self: flex-end;
        }

        .chat-input-area {
            padding: 0.8rem;
            border-top: 1px solid #26292f;
            display: flex;
            gap: 6px;
            background: #121315;
        }

        .chat-input-area input {
            flex: 1;
            min-width: 0;
            background: #1a1c22;
            border: 1px solid #2f323a;
            border-radius: 30px;
            padding: 0.7rem 1rem;
            color: #fff;
            outline: none;
            font-size: 0.85rem;
        }

        .chat-input-area input:focus {
            border-color: #1DB954;
        }

        .chat-input-area input:disabled {
            opacity: 0.4;
        }

        .chat-input-area button {
            background: #1DB954;
            border: none;
            border-radius: 30px;
            width: 44px;
            color: #0b0b0b;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .chat-input-area button:hover:not(:disabled) {
            background: #1ed760;
        }

        .chat-input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #4b5363;
            padding: 2rem;
            font-size: 0.85rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar, .chat-panel {
                width: 250px;
            }
        }

        @media (max-width: 640px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 35vh;
                border-right: none;
                border-bottom: 1px solid #2a2d33;
            }
            .center-area {
                height: 25vh;
                min-height: 120px;
                border-bottom: 1px solid #2a2d33;
            }
            .chat-panel {
                width: 100%;
                height: 40vh;
                border-left: none;
                border-top: 1px solid #2a2d33;
            }
            .user-list {
                display: flex;
                overflow-x: auto;
                gap: 0.5rem;
                padding: 0 0.8rem 0.5rem;
            }
            .user-item {
                min-width: 140px;
                margin-bottom: 0;
                flex-shrink: 0;
            }
            .chat-input-area {
                padding: 0.6rem;
            }
            .chat-input-area input {
                padding: 0.6rem 0.9rem;
            }
            .chat-input-area button {
                width: 40px;
            }
        }

        /* LAYAR SANGAT KECIL */
        @media (max-width: 380px) {
            .sidebar {
                max-height: 30vh;
            }
            .user-item {
                min-width: 120px;
                padding: 0.5rem;
            }
            .avatar {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
            .user-name {
                font-size: 0.8rem;
            }
            .chat-panel {
                height: 45vh;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- SIDEBAR KIRI -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>WARPONG</h2>
                <span>● silver line</span>
            </div>

            <div class="online-counter">
                <span class="label"><span class="dot"></span> Online sekarang</span>
                <span class="count" id="onlineCount">2</span>
            </div>

            <div class="broadcast-btn" onclick="broadcastNgopi()">
                <i class="fas fa-coffee"></i> Ngopi Yuk!
            </div>

            <div class="user-list" id="userList">
                <!-- User items akan diisi JavaScript -->
            </div>
        </div>

        <!-- AREA TENGAH -->
        <div class="center-area">
            <div class="placeholder-message">
                <i class="fas fa-map-marked-alt"></i>
                <p>Fitur lokasi tidak tersedia</p>
                <small>akan hadir di update berikutnya</small>
            </div>
        </div>

        <!-- CHAT PANEL -->
        <div class="chat-panel">
            <div class="chat-header">
                <i class="fas fa-comment"></i>
                Chat
                <span id="chatWith">pilih user</span>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="loading">Pilih user untuk mulai chat</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="tulis pesan..." disabled>
                <button id="sendBtn" onclick="sendMessage()" disabled>➔</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // KONFIGURASI FIREBASE - ISI DENGAN PUNYA LU
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_LU",
            authDomain: "ISI_AUTH_DOMAIN_LU",
            databaseURL: "ISI_DATABASE_URL_LU",
            projectId: "warpongposv2",
            storageBucket: "ISI_STORAGE_BUCKET_LU",
            messagingSenderId: "ISI_MESSAGING_SENDER_ID_LU",
            appId: "ISI_APP_ID_LU"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const currentUser = JSON.parse(localStorage.getItem('user')) || { 
            uid: 'guest', 
            nama: 'Guest',
            avatar: 'https://ui-avatars.com/api/?name=Guest&background=1DB954&color=fff'
        };
        
        let selectedUser = null;

        // Data dummy user
        const dummyUsers = [
            { uid: 'user1', nama: 'Budi', status: 'online' },
            { uid: 'user2', nama: 'Ani', status: 'offline' },
            { uid: 'user3', nama: 'Charlie', status: 'online' }
        ];

        let onlineCount = dummyUsers.filter(u => u.status === 'online').length;
        document.getElementById('onlineCount').innerText = onlineCount;

        // Render user list
        const userList = document.getElementById('userList');
        userList.innerHTML = dummyUsers.map(user => `
            <div class="user-item" onclick="selectUser('${user.uid}', '${user.nama}')">
                <div class="avatar">
                    ${user.nama.charAt(0).toUpperCase()}
                </div>
                <div class="user-info">
                    <div class="user-name">${user.nama}</div>
                    <div class="user-status">
                        <span class="status-dot ${user.status === 'offline' ? 'offline' : ''}"></span>
                        ${user.status}
                    </div>
                </div>
            </div>
        `).join('');

        function broadcastNgopi() {
            alert('Fitur broadcast akan segera hadir!');
        }

        function selectUser(uid, name) {
            selectedUser = uid;
            document.getElementById('chatWith').innerText = name;

            document.querySelectorAll('.user-item').forEach(el => {
                el.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');

            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            
            document.getElementById('chatMessages').innerHTML = `
                <div class="message">Halo, apa kabar?</div>
                <div class="message own">Baik banget nih</div>
            `;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!selectedUser || !input.value.trim()) return;

            const chatDiv = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message own';
            div.innerText = input.value;
            chatDiv.appendChild(div);
            input.value = '';
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
    </script>
</body>
</html>
