<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>WARPONG · chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f172a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* ========== MOBILE-FIRST SIDEBAR ========== */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100vh;
            background: #1e293b;
            border-right: 2px solid #3b9eff;
            z-index: 2000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.5);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 5px #3b9eff;
        }

        .sidebar-header span {
            color: #3b9eff;
            font-size: 0.8rem;
        }

        .online-indicator {
            background: #0f172a;
            margin: 1rem;
            padding: 0.7rem 1rem;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #3b9eff;
        }

        .online-indicator .label {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 8px;
            background: #3b9eff;
            display: inline-block;
            margin-right: 6px;
        }

        .online-indicator .count {
            background: #3b9eff;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-weight: 600;
        }

        .broadcast-btn {
            margin: 0 1rem 1rem;
            background: #0f172a;
            border: 1px solid #3b9eff;
            color: white;
            padding: 0.8rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem;
        }

        .user-item {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-item:hover {
            border-color: #3b9eff;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            background: #3b9eff;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 48px;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .user-status {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 6px;
            background: #3b9eff;
        }

        .status-dot.offline {
            background: #64748b;
        }

        /* ========== MAIN CHAT AREA ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0b1120;
            width: 100%;
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }

        /* Desktop adjustment */
        @media (min-width: 1024px) {
            .sidebar {
                position: static;
                left: 0;
            }
            .chat-area {
                margin-left: 0;
            }
        }

        .chat-header {
            padding: 1rem 1rem 1rem 4rem;
            background: #1e293b;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 70px;
        }

        @media (min-width: 1024px) {
            .chat-header {
                padding-left: 1.5rem;
            }
        }

        .menu-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: #1e293b;
            border: 2px solid #3b9eff;
            border-radius: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2500;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(59, 158, 255, 0.3);
        }

        @media (min-width: 1024px) {
            .menu-toggle {
                display: none;
            }
        }

        .chat-header i {
            color: #3b9eff;
            font-size: 1.2rem;
        }

        .chat-header span {
            color: white;
            font-weight: 500;
            margin-left: auto;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 85%;
            padding: 0.8rem 1.2rem;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.4;
            align-self: flex-start;
            background: #1e293b;
            color: #e2e8f0;
            word-break: break-word;
        }

        .message.own {
            align-self: flex-end;
            background: #3b9eff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            padding: 1rem;
            background: #1e293b;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-input-area input {
            flex: 1;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .chat-input-area input:focus {
            border-color: #3b9eff;
        }

        .chat-input-area input:disabled {
            opacity: 0.4;
        }

        .chat-input-area button {
            background: #3b9eff;
            border: none;
            border-radius: 30px;
            padding: 0 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-input-area button:disabled {
            opacity: 0.4;
        }

        .loading {
            text-align: center;
            color: #64748b;
            padding: 2rem;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1999;
            display: none;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="app">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>WARPONG</h2>
                <span>● private circle</span>
            </div>

            <div class="online-indicator">
                <span class="label"><span class="dot"></span> online</span>
                <span class="count" id="onlineCount">0</span>
            </div>

            <div class="broadcast-btn" onclick="broadcastNgopi()">
                <i class="fas fa-coffee"></i> Ngopi Yuk!
            </div>

            <div class="user-list" id="userList">
                <div class="loading">memuat circle …</div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area">
            <div class="chat-header">
                <i class="fas fa-comment"></i>
                <span id="chatWith">pilih user</span>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="loading">— pilih teman buat ngobrol —</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="tulis pesan..." disabled>
                <button id="sendBtn" onclick="sendMessage()" disabled>Kirim</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Konfigurasi Firebase (GANTI!)
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_LU",
            authDomain: "ISI_AUTH_DOMAIN_LU",
            databaseURL: "ISI_DATABASE_URL_LU",
            projectId: "warpongposv2",
            storageBucket: "ISI_STORAGE_BUCKET_LU",
            messagingSenderId: "ISI_MESSAGING_SENDER_ID_LU",
            appId: "ISI_APP_ID_LU"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Cek login
        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        let selectedUser = null;
        let onlineUsers = new Set();

        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function updateOnlineCount() {
            document.getElementById('onlineCount').innerText = onlineUsers.size;
        }

        function broadcastNgopi() {
            alert('Fitur broadcast akan segera hadir!');
        }

        // Load users
        function loadUsers() {
            const userList = document.getElementById('userList');
            userList.innerHTML = '<div class="loading">memuat circle …</div>';

            database.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                userList.innerHTML = '';

                if (!users) {
                    userList.innerHTML = '<div class="loading">masih sepi …</div>';
                    return;
                }

                onlineUsers.clear();

                Object.keys(users).forEach(uid => {
                    const u = users[uid];
                    if (uid === currentUser.uid) {
                        if (u.status === 'online') onlineUsers.add(uid);
                        return;
                    }

                    const isOnline = u.status === 'online';
                    if (isOnline) onlineUsers.add(uid);

                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.setAttribute('data-user-id', uid);
                    div.onclick = () => {
                        selectUser(uid, u.nama || u.email);
                        if (window.innerWidth <= 1024) toggleSidebar();
                    };

                    div.innerHTML = `
                        <div class="avatar">
                            <img src="${u.avatar || `https://ui-avatars.com/api/?name=${u.nama || u.email}&background=3b9eff&color=fff`}" />
                        </div>
                        <div class="user-info">
                            <div class="user-name">${u.nama || u.email}</div>
                            <div class="user-status">
                                <span class="status-dot ${isOnline ? '' : 'offline'}"></span>
                                ${isOnline ? 'online' : 'offline'}
                            </div>
                        </div>
                    `;
                    userList.appendChild(div);
                });

                updateOnlineCount();
            });
        }
        loadUsers();

        // Select user
        function selectUser(uid, displayName) {
            selectedUser = uid;
            document.getElementById('chatWith').innerText = displayName;

            document.querySelectorAll('.user-item').forEach(el => {
                el.style.background = '';
            });
            const selected = document.querySelector(`.user-item[data-user-id="${uid}"]`);
            if (selected) selected.style.background = '#2d3a4f';

            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            loadChat(uid);
        }

        // Load chat
        function loadChat(toUid) {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '<div class="loading">memuat pesan …</div>';

            database.ref('messages').orderByChild('timestamp').on('value', (snapshot) => {
                const allMessages = snapshot.val();
                chatDiv.innerHTML = '';

                if (!allMessages) {
                    chatDiv.innerHTML = '<div class="loading">belum ada pesan</div>';
                    return;
                }

                const myUid = currentUser.uid;
                const messages = [];

                Object.keys(allMessages).forEach(key => {
                    const msg = allMessages[key];
                    if ((msg.from === myUid && msg.to === toUid) || (msg.from === toUid && msg.to === myUid)) {
                        messages.push(msg);
                    }
                });

                messages.sort((a, b) => a.timestamp - b.timestamp);

                if (messages.length === 0) {
                    chatDiv.innerHTML = '<div class="loading">belum ada pesan</div>';
                    return;
                }

                messages.forEach(msg => {
                    const isMe = msg.from === myUid;
                    const div = document.createElement('div');
                    div.className = `message ${isMe ? 'own' : ''}`;
                    div.innerText = msg.message;
                    chatDiv.appendChild(div);
                });

                chatDiv.scrollTop = chatDiv.scrollHeight;
            });
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!selectedUser || !input.value.trim()) return;

            const message = {
                from: currentUser.uid,
                to: selectedUser,
                message: input.value,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            database.ref('messages').push(message);

            const chatDiv = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message own';
            div.innerText = input.value;
            chatDiv.appendChild(div);
            input.value = '';
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Auto close sidebar on resize
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) {
                document.querySelector('.sidebar').classList.remove('active');
                document.querySelector('.overlay').classList.remove('active');
            }
        });
    </script>
</body>
</html>
