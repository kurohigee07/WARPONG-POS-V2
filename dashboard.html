<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WARPONG · chat</title>
    <!-- Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Leaflet (MAP) - SEMENTARA DI MATIKAN DULU -->
    <!-- <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> -->
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0b0b;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
            background: #0b0b0b;
            position: relative;
        }

        /* SIDEBAR KIRI - DAFTAR USER */
        .sidebar {
            width: 280px;
            background: #121315;
            border-right: 1px solid #2a2d33;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: left 0.3s ease;
        }

        .sidebar-header {
            padding: 1.5rem 1.2rem;
            border-bottom: 1px solid #26292f;
        }

        .sidebar-header h2 {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #a0aaba);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header span {
            color: #1DB954;
            font-size: 0.7rem;
            margin-left: 4px;
        }

        .online-indicator {
            background: #1a1c22;
            margin: 1rem 1.2rem;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2f323a;
            flex-shrink: 0;
        }

        .online-indicator .label {
            color: #8f99a8;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            background: #1DB954;
            display: inline-block;
        }

        .online-indicator .count {
            background: #262a33;
            color: #fff;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .broadcast-btn {
            margin: 0 1.2rem 1.2rem;
            background: #1a1c22;
            border: 1px solid #2f323a;
            color: #e2e8f0;
            padding: 0.9rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .broadcast-btn:hover {
            background: #20232a;
            border-color: #1DB954;
            color: #fff;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 1.2rem;
        }

        .user-item {
            background: #1a1c22;
            border: 1px solid #2f323a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-item:hover {
            border-color: #1DB954;
            background: #20232a;
            transform: translateX(4px);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: #262a33;
            border: 2px solid #3f4550;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 44px;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status {
            font-size: 0.7rem;
            color: #8f99a8;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 6px;
            background: #1DB954;
        }

        .status-dot.offline {
            background: #4b5363;
        }

        /* CHAT PANEL (SEKARANG JADI KONTEN UTAMA) */
        .chat-panel {
            flex: 1;
            background: #0f0f10;
            display: flex;
            flex-direction: column;
            min-width: 0; /* Penting buat flexbox */
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #26292f;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccd6e3;
            background: #121315;
        }

        .chat-header i {
            color: #1DB954;
            font-size: 1.2rem;
        }

        .chat-header span {
            color: #1DB954;
            font-weight: 500;
            margin-left: auto;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: #0a0a0a;
        }

        .message {
            max-width: 70%;
            padding: 0.8rem 1.2rem;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            align-self: flex-start;
            background: #1a1c22;
            border: 1px solid #2f323a;
            color: #e2e8f0;
        }

        .message.own {
            align-self: flex-end;
            background: #1DB954;
            border-color: #1DB954;
            color: #0b0b0b;
            font-weight: 500;
        }

        .chat-input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid #26292f;
            display: flex;
            gap: 12px;
            background: #121315;
        }

        .chat-input-area input {
            flex: 1;
            background: #1a1c22;
            border: 1px solid #2f323a;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            color: #fff;
            outline: none;
            font-size: 1rem;
        }

        .chat-input-area input:focus {
            border-color: #1DB954;
        }

        .chat-input-area input:disabled {
            opacity: 0.4;
        }

        .chat-input-area button {
            background: #1DB954;
            border: none;
            border-radius: 30px;
            padding: 0 1.5rem;
            color: #0b0b0b;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .chat-input-area button:hover:not(:disabled) {
            background: #1ed760;
        }

        .chat-input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #4b5363;
            padding: 2rem;
        }

        /* TOMBOL MENU HP (SIDEBAR TOGGLE) */
        .menu-toggle {
            position: fixed;
            top: 12px;
            left: 12px;
            width: 48px;
            height: 48px;
            background: #1a1c22;
            border: 2px solid #1DB954;
            border-radius: 48px;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: #1DB954;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
            transition: all 0.2s;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
            z-index: 1500;
        }

        /* RESPONSIVE HP */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .sidebar {
                position: fixed;
                left: -280px;
                height: 100vh;
                z-index: 1999;
                box-shadow: 5px 0 20px rgba(0, 0, 0, 0.8);
                border-right: 2px solid #1DB954;
            }

            .sidebar.active {
                left: 0;
            }

            .overlay.active {
                display: block;
            }
        }

        /* MAP AREA - DI MATIKAN TOTAL DULU */
        .map-container {
            display: none;
        }
        #map {
            display: none;
        }
        .location-status {
            display: none;
        }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
    <div class="overlay" onclick="toggleSidebar()"></div>

    <div class="app">
        <!-- SIDEBAR KIRI -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>WARPONG</h2>
                <span>● silver line</span>
            </div>

            <div class="online-indicator">
                <span class="label"><span class="dot"></span> online</span>
                <span class="count" id="onlineCount">0</span>
            </div>

            <div class="broadcast-btn" onclick="broadcastNgopi()">
                <i class="fas fa-coffee"></i> Ngopi Yuk!
            </div>

            <div class="user-list" id="userList">
                <div class="loading">memuat circle …</div>
            </div>
        </div>

        <!-- CHAT PANEL (UTAMA) -->
        <div class="chat-panel">
            <div class="chat-header">
                <i class="fas fa-comment"></i>
                <span id="chatWith">pilih user</span>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="loading">— pilih teman buat ngobrol —</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="tulis pesan..." disabled>
                <button id="sendBtn" onclick="sendMessage()" disabled>Kirim</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ============================================
        // 1. KONFIGURASI FIREBASE (GANTI DENGAN PUNYA LU)
        // ============================================
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_LU",
            authDomain: "ISI_AUTH_DOMAIN_LU",
            databaseURL: "ISI_DATABASE_URL_LU",
            projectId: "warpongposv2",
            storageBucket: "ISI_STORAGE_BUCKET_LU",
            messagingSenderId: "ISI_MESSAGING_SENDER_ID_LU",
            appId: "ISI_APP_ID_LU"
        };

        // Init Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ============================================
        // 2. CEK LOGIN
        // ============================================
        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // ============================================
        // 3. VARIABEL GLOBAL
        // ============================================
        let selectedUser = null;
        let onlineUsers = new Set();

        // ============================================
        // 4. TOGGLE SIDEBAR (HP)
        // ============================================
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        // ============================================
        // 5. UPDATE ONLINE COUNT
        // ============================================
        function updateOnlineCount() {
            document.getElementById('onlineCount').innerText = onlineUsers.size;
        }

        // ============================================
        // 6. BROADCAST NGOPI (SEMENTARA)
        // ============================================
        function broadcastNgopi() {
            const tempat = prompt('Mau ngopi dimana?');
            if (tempat) {
                alert(`Broadcast: ngopi yuk di ${tempat} ☕`);
                // TODO: Implementasi broadcast ke semua user
            }
        }

        // ============================================
        // 7. LOAD DAFTAR USER DARI FIREBASE
        // ============================================
        function loadUsers() {
            const userListDiv = document.getElementById('userList');
            userListDiv.innerHTML = '<div class="loading">memuat circle …</div>';

            database.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                userListDiv.innerHTML = '';

                if (!users) {
                    userListDiv.innerHTML = '<div class="loading">masih sepi …</div>';
                    return;
                }

                onlineUsers.clear();

                Object.keys(users).forEach(uid => {
                    const u = users[uid];
                    // Skip diri sendiri
                    if (uid === currentUser.uid) {
                        if (u.status === 'online') onlineUsers.add(uid);
                        return;
                    }

                    const isOnline = u.status === 'online';
                    if (isOnline) onlineUsers.add(uid);

                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.setAttribute('data-user-id', uid);
                    div.onclick = () => {
                        selectUser(uid, u.nama || u.email);
                        if (window.innerWidth <= 768) toggleSidebar();
                    };

                    div.innerHTML = `
                        <div class="avatar">
                            <img src="${u.avatar || 'https://ui-avatars.com/api/?name=' + (u.nama || u.email) + '&background=1DB954&color=fff'}" />
                        </div>
                        <div class="user-info">
                            <div class="user-name">${u.nama || u.email}</div>
                            <div class="user-status">
                                <span class="status-dot ${isOnline ? '' : 'offline'}"></span>
                                ${isOnline ? 'online' : 'offline'}
                            </div>
                        </div>
                    `;
                    userListDiv.appendChild(div);
                });

                updateOnlineCount();
            });
        }
        loadUsers();

        // ============================================
        // 8. SELECT USER UNTUK CHAT
        // ============================================
        function selectUser(uid, displayName) {
            selectedUser = uid;
            document.getElementById('chatWith').innerText = displayName;

            // Highlight user yang dipilih
            document.querySelectorAll('.user-item').forEach(el => {
                el.style.background = '';
                el.style.borderColor = '';
            });
            const selectedEl = document.querySelector(`.user-item[data-user-id="${uid}"]`);
            if (selectedEl) {
                selectedEl.style.background = '#20232a';
                selectedEl.style.borderColor = '#1DB954';
            }

            // Enable chat input
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            loadChat(uid);
        }

        // ============================================
        // 9. LOAD CHAT HISTORY
        // ============================================
        function loadChat(toUid) {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '<div class="loading">memuat pesan …</div>';

            database.ref('messages').orderByChild('timestamp').on('value', (snapshot) => {
                const allMessages = snapshot.val();
                chatDiv.innerHTML = '';

                if (!allMessages) {
                    chatDiv.innerHTML = '<div class="loading">belum ada pesan</div>';
                    return;
                }

                const myUid = currentUser.uid;
                const messages = [];

                Object.keys(allMessages).forEach(key => {
                    const msg = allMessages[key];
                    if ((msg.from === myUid && msg.to === toUid) || (msg.from === toUid && msg.to === myUid)) {
                        messages.push(msg);
                    }
                });

                messages.sort((a, b) => a.timestamp - b.timestamp);

                if (messages.length === 0) {
                    chatDiv.innerHTML = '<div class="loading">belum ada pesan</div>';
                    return;
                }

                messages.forEach(msg => {
                    const isMe = msg.from === myUid;
                    const div = document.createElement('div');
                    div.className = `message ${isMe ? 'own' : ''}`;
                    div.innerText = msg.message;
                    chatDiv.appendChild(div);
                });

                chatDiv.scrollTop = chatDiv.scrollHeight;
            });
        }

        // ============================================
        // 10. KIRIM PESAN
        // ============================================
        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!selectedUser || !input.value.trim()) return;

            const message = {
                from: currentUser.uid,
                to: selectedUser,
                message: input.value,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            database.ref('messages').push(message);

            // Optimistic update
            const chatDiv = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message own';
            div.innerText = input.value;
            chatDiv.appendChild(div);
            input.value = '';
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // ============================================
        // 11. FITUR LOKASI (DI MATIKAN DULU)
        // =
