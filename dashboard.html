<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WARPONG · dashboard</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0b0b;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* SIDEBAR KIRI */
        .sidebar {
            width: 280px;
            background: #121315;
            border-right: 1px solid #2a2d33;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1.5rem 1.2rem;
            border-bottom: 1px solid #26292f;
        }

        .sidebar-header h2 {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #fff, #a0aaba);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header span {
            color: #1DB954;
            font-size: 0.7rem;
            margin-left: 4px;
        }

        .online-indicator {
            background: #1a1c22;
            margin: 1rem 1.2rem;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2f323a;
            flex-shrink: 0;
        }

        .online-indicator .label {
            color: #8f99a8;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            background: #1DB954;
            display: inline-block;
        }

        .online-indicator .count {
            background: #262a33;
            color: #fff;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .broadcast-btn {
            margin: 0 1.2rem 1.2rem;
            background: #1a1c22;
            border: 1px solid #2f323a;
            color: #e2e8f0;
            padding: 0.9rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .broadcast-btn:hover {
            background: #20232a;
            border-color: #1DB954;
            color: #fff;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 1.2rem;
        }

        .user-item {
            background: #1a1c22;
            border: 1px solid #2f323a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-item:hover {
            border-color: #1DB954;
            background: #20232a;
            transform: translateX(4px);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: #262a33;
            border: 2px solid #3f4550;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 44px;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status {
            font-size: 0.7rem;
            color: #8f99a8;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 6px;
            background: #1DB954;
        }

        .status-dot.offline {
            background: #4b5363;
        }

        /* KONTEN TENGAH - BEKAS MAP (KOSONG) */
        .main-content {
            flex: 1;
            background: #0f0f10;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            color: #4b5363;
            font-size: 0.9rem;
        }

        .placeholder-message {
            text-align: center;
            padding: 1rem;
            background: #1a1c22;
            border-radius: 16px;
            border: 1px solid #2f323a;
        }

        /* CHAT PANEL KANAN */
        .chat-panel {
            width: 320px;
            background: #121315;
            border-left: 1px solid #2a2d33;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .chat-header {
            padding: 1.5rem 1.2rem;
            border-bottom: 1px solid #26292f;
            font-weight: 500;
            color: #ccd6e3;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header i {
            color: #1DB954;
        }

        .chat-header span {
            color: #1DB954;
            margin-left: auto;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .message {
            max-width: 85%;
            padding: 0.7rem 1rem;
            border-radius: 18px;
            background: #1a1c22;
            border: 1px solid #2f323a;
            font-size: 0.85rem;
            align-self: flex-start;
            color: #e2e8f0;
            word-break: break-word;
        }

        .message.own {
            background: #1DB954;
            border-color: #1DB954;
            color: #0b0b0b;
            align-self: flex-end;
        }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid #26292f;
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            background: #1a1c22;
            border: 1px solid #2f323a;
            border-radius: 40px;
            padding: 0.8rem 1rem;
            color: #fff;
            outline: none;
            font-size: 0.85rem;
        }

        .chat-input-area input:focus {
            border-color: #1DB954;
        }

        .chat-input-area input:disabled {
            opacity: 0.4;
        }

        .chat-input-area button {
            background: #1DB954;
            border: none;
            border-radius: 40px;
            width: 48px;
            color: #0b0b0b;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .chat-input-area button:hover:not(:disabled) {
            background: #1ed760;
        }

        .chat-input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #4b5363;
            padding: 2rem;
        }

        .silver-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #3f4550, transparent);
            margin: 0.5rem 0;
        }

        /* RESPONSIVE HP */
        @media (max-width: 768px) {
            .sidebar {
                width: 240px;
            }
            .chat-panel {
                width: 240px;
            }
        }

        @media (max-width: 640px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid #2a2d33;
            }
            .main-content {
                height: 30vh;
            }
            .chat-panel {
                width: 100%;
                height: 30vh;
                border-left: none;
                border-top: 1px solid #2a2d33;
            }
            .user-list {
                display: flex;
                overflow-x: auto;
                gap: 0.5rem;
                padding: 0 1rem 0.5rem;
            }
            .user-item {
                min-width: 140px;
                margin-bottom: 0;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- SIDEBAR KIRI -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>WARPONG</h2>
                <span>● silver line</span>
            </div>

            <div class="online-indicator">
                <span class="label"><span class="dot"></span> online</span>
                <span class="count" id="onlineCount">0</span>
            </div>

            <div class="broadcast-btn" onclick="broadcastNgopi()">
                <i class="fas fa-coffee"></i> Ngopi Yuk!
            </div>

            <div class="user-list" id="userList">
                <div class="loading">memuat circle …</div>
            </div>
        </div>

        <!-- KONTEN TENGAH (BEKAS MAP, SEKARANG KOSONG) -->
        <div class="main-content">
            <div class="placeholder-message">
                <i class="fas fa-map-marked-alt" style="font-size: 2rem; color: #1DB954; margin-bottom: 0.5rem; display: block;"></i>
                <p>Fitur lokasi belum tersedia</p>
            </div>
        </div>

        <!-- CHAT PANEL KANAN -->
        <div class="chat-panel">
            <div class="chat-header">
                <i class="fas fa-comment"></i>
                Chat
                <span id="chatWith">pilih user</span>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="loading">— pilih teman buat ngobrol —</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="tulis pesan..." disabled>
                <button id="sendBtn" onclick="sendMessage()" disabled>➔</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // KONFIGURASI FIREBASE - GANTI DENGAN PUNYA LU
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_LU",
            authDomain: "ISI_AUTH_DOMAIN_LU",
            databaseURL: "ISI_DATABASE_URL_LU",
            projectId: "warpongposv2",
            storageBucket: "ISI_STORAGE_BUCKET_LU",
            messagingSenderId: "ISI_MESSAGING_SENDER_ID_LU",
            appId: "ISI_APP_ID_LU"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        let selectedUser = null;
        let onlineUsers = new Set();

        function updateOnlineCount() {
            document.getElementById('onlineCount').innerText = onlineUsers.size;
        }

        function broadcastNgopi() {
            alert('Fitur broadcast dalam pengembangan');
        }

        // LOAD USERS
        function loadUsers() {
            const userList = document.getElementById('userList');
            userList.innerHTML = '<div class="loading">memuat circle …</div>';

            database.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                userList.innerHTML = '';

                if (!users) {
                    userList.innerHTML = '<div class="loading">masih sepi …</div>';
                    return;
                }

                onlineUsers.clear();

                Object.keys(users).forEach(uid => {
                    const u = users[uid];
                    if (uid === currentUser.uid) {
                        if (u.status === 'online') onlineUsers.add(uid);
                        return;
                    }

                    const isOnline = u.status === 'online';
                    if (isOnline) onlineUsers.add(uid);

                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.setAttribute('data-user-id', uid);
                    div.onclick = () => selectUser(uid, u.nama || u.email);

                    div.innerHTML = `
                        <div class="avatar">
                            <img src="${u.avatar || 'https://ui-avatars.com/api/?name=' + (u.nama || u.email) + '&background=1DB954&color=fff'}" />
                        </div>
                        <div class="user-info">
                            <div class="user-name">${u.nama || u.email}</div>
                            <div class="user-status">
                                <span class="status-dot ${isOnline ? '' : 'offline'}"></span>
                                ${isOnline ? 'online' : 'offline'}
                            </div>
                        </div>
                    `;
                    userList.appendChild(div);
                });

                updateOnlineCount();
            });
        }
        loadUsers();

        function selectUser(uid, displayName) {
            selectedUser = uid;
            document.getElementById('chatWith').innerText = displayName;

            document.querySelectorAll('.user-item').forEach(el => {
                el.style.background = '';
                el.style.borderColor = '';
            });
            const selectedEl = document.querySelector(`.user-item[data-user-id="${uid}"]`);
            if (selectedEl) {
                selectedEl.style.background = '#20232a';
                selectedEl.style.borderColor = '#1DB954';
            }

            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            loadChat(uid);
        }

        function loadChat(toUid) {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '<div class="loading">memuat pesan …</div>';

            database.ref('messages').orderByChild('timestamp').on('value', (snapshot) => {
                const allMessages = snapshot.val();
                chatDiv.innerHTML = '';

                if (!allMessages) {
                    chatDiv.innerHTML = '<div class="loading">belum ada pesan</div>';
                    return;
                }

                const myUid = currentUser.uid;
                const messages = [];

                Object.keys(allMessages).forEach(key => {
                    const msg = allMessages[key];
                    if ((msg.from === myUid && msg.to === toUid) || (msg.from === toUid && msg.to === myUid)) {
                        messages.push(msg);
                    }
                });

                messages.sort((a, b) => a.timestamp - b.timestamp);

                if (messages.length === 0) {
                    chatDiv.innerHTML = '<div class="loading">belum ada pesan</div>';
                    return;
                }

                messages.forEach(msg => {
                    const isMe = msg.from === myUid;
                    const div = document.createElement('div');
                    div.className = `message ${isMe ? 'own' : ''}`;
                    div.innerText = msg.message;
                    chatDiv.appendChild(div);
                });

                chatDiv.scrollTop = chatDiv.scrollHeight;
            });
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!selectedUser || !input.value.trim()) return;

            const message = {
                from: currentUser.uid,
                to: selectedUser,
                message: input.value,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            database.ref('messages').push(message);

            const chatDiv = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message own';
            div.innerText = input.value;
            chatDiv.appendChild(div);
            input.value = '';
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
    </script>
</body>
</html>
