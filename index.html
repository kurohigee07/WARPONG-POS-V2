<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARPONG · login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0b0b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .card {
            background: #121315;
            border: 1px solid #2a2d33;
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #7e8798;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            border-left: 3px solid #1DB954;
            padding-left: 0.75rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #9aa3b3;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: #1a1c22;
            border: 1px solid #2f323a;
            border-radius: 16px;
            padding: 1rem 1.2rem;
            color: #f0f4fa;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #1DB954;
            background: #202229;
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.1);
        }

        .btn {
            width: 100%;
            background: #1DB954;
            color: #0b0b0b;
            font-weight: 600;
            font-size: 1rem;
            padding: 1rem;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            background: #1ed760;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(29, 185, 84, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #9aa3b3;
            border: 1px solid #2f323a;
        }

        .btn-secondary:hover {
            background: #1a1c22;
            color: #fff;
            border-color: #1DB954;
            transform: none;
            box-shadow: none;
        }

        .link {
            text-align: center;
            margin-top: 1.5rem;
            color: #7e8798;
            font-size: 0.9rem;
        }

        .link button {
            background: none;
            border: none;
            color: #1DB954;
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: #1DB954;
            text-decoration-thickness: 1px;
        }

        .link button:hover {
            color: #1ed760;
        }

        .hidden {
            display: none;
        }

        /* Silver accent */
        .silver-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #3f4550, #7e8798, #3f4550, transparent);
            margin: 2rem 0;
            width: 100%;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #4b5363;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>WARPONG</h1>
            <div class="subtitle">private circle · silver line</div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="cth: kurohige" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button class="btn" onclick="handleLogin()">→ MASUK</button>
                <div class="link">
                    belum punya akun? <button onclick="toggleForm(true)">daftar</button>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" placeholder="pilih username">
                </div>
                <div class="input-group">
                    <label>Nama panggilan</label>
                    <input type="text" id="regNama" placeholder="gimana orang manggil lu">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="minimal 6 karakter">
                </div>
                <button class="btn" onclick="handleRegister()">→ DAFTAR</button>
                <button class="btn btn-secondary" onclick="toggleForm(false)" style="margin-top: 0.5rem;">← KEMBALI</button>
            </div>

            <div class="silver-line"></div>
            <div class="footer">© 2026 · WARPONG CIRCLE</div>
        </div>
    </div>

    <script>
        // ============================================
        // GANTI INI DENGAN URL BACKEND V2 LU
        // ============================================
        const API_URL = 'https://warpongposv2-g4s6ji7l.b4a.run';

        // Toggle form login/register
        function toggleForm(showRegister) {
            document.getElementById('loginForm').classList.toggle('hidden', showRegister);
            document.getElementById('registerForm').classList.toggle('hidden', !showRegister);
        }

        // Handle Login
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('Isi username dan password dulu bos!');
                return;
            }

            try {
                const res = await fetch(API_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                console.log('Login response:', data);

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Login gagal: ' + (data.message || 'Username/password salah'));
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Gagal konek ke server. Cek backend');
            }
        }

        // Handle Register
        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const nama = document.getElementById('regNama').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            if (!username || !nama || !password) {
                alert('Isi semua data dulu bos!');
                return;
            }

            try {
                const res = await fetch(API_URL + '/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nama })
                });

                const data = await res.json();
                console.log('Register response:', data);

                if (data.success) {
                    alert('Register berhasil! Silakan login.');
                    toggleForm(false);
                } else {
                    alert('Register gagal: ' + (data.message || 'Username sudah dipakai'));
                }
            } catch (error) {
                console.error('Register error:', error);
                alert('Gagal konek ke server. Cek backend');
            }
        }
    </script>
</body>
  </html>
