<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>WARPONG · login</title>
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #0e1a2b 0%, #1b2f44 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            color: white;
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 10px rgba(0, 150, 255, 0.5);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 1rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
            margin-left: 0.5rem;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 1rem 1.2rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #3b9eff;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 158, 255, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.95rem;
        }

        .btn {
            width: 100%;
            background: #3b9eff;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(59, 158, 255, 0.4);
        }

        .btn:hover {
            background: #2a80e0;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(59, 158, 255, 0.6);
        }

        .btn-secondary {
            background: transparent;
            box-shadow: none;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            margin-top: 0.5rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b9eff;
            transform: none;
            box-shadow: none;
        }

        .link {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }

        .link button {
            background: none;
            border: none;
            color: #3b9eff;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .hidden {
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>WARPONG</h1>
            <div class="subtitle">private circle</div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="nama@email.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button class="btn" onclick="handleLogin()">MASUK</button>
                <div class="link">
                    Belum punya akun? <button onclick="toggleForm(true)">Daftar</button>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="nama@email.com">
                </div>
                <div class="input-group">
                    <label>Nama panggilan</label>
                    <input type="text" id="regNama" placeholder="cth: Jarz">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="minimal 6 karakter">
                </div>
                <button class="btn" onclick="handleRegister()">DAFTAR</button>
                <button class="btn btn-secondary" onclick="toggleForm(false)">← KEMBALI KE LOGIN</button>
            </div>

            <div class="footer">© 2026 · WARPONG</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Konfigurasi Firebase (GANTI!)
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_LU",
            authDomain: "ISI_AUTH_DOMAIN_LU",
            databaseURL: "ISI_DATABASE_URL_LU",
            projectId: "warpongposv2",
            storageBucket: "ISI_STORAGE_BUCKET_LU",
            messagingSenderId: "ISI_MESSAGING_SENDER_ID_LU",
            appId: "ISI_APP_ID_LU"
        };

        // Init Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Toggle form
        function toggleForm(showRegister) {
            document.getElementById('loginForm').classList.toggle('hidden', showRegister);
            document.getElementById('registerForm').classList.toggle('hidden', !showRegister);
        }

        // REGISTER
        async function handleRegister() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const nama = document.getElementById('regNama').value;

            if (!email || !password || !nama) {
                alert('Isi semua data');
                return;
            }

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Simpan data user ke database
                await database.ref('users/' + user.uid).set({
                    nama: nama,
                    email: email,
                    status: 'online',
                    avatar: `https://ui-avatars.com/api/?name=${nama}&background=3b9eff&color=fff`
                });

                alert('Daftar berhasil! Silakan login.');
                toggleForm(false);
            } catch (error) {
                alert(error.message);
            }
        }

        // LOGIN
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('Isi email dan password');
                return;
            }

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await database.ref('users/' + user.uid).update({
                    status: 'online'
                });

                const snapshot = await database.ref('users/' + user.uid).once('value');
                const userData = snapshot.val();

                localStorage.setItem('user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    nama: userData.nama,
                    avatar: userData.avatar
                }));

                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('Login gagal: ' + error.message);
            }
        }
    </script>
</body>
</html>
